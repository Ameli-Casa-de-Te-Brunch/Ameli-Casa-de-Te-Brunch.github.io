name: Build y publicar menú

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install openpyxl
      - run: python build.py
      - name: Generar config.js con el endpoint de votos
        env:
          VOTOS_ENDPOINT: ${{ secrets.VOTOS_ENDPOINT }}
        run: |
          cat > dist/config.js <<EOF
          window.AMELI_CONFIG = { votosEndpoint: "${VOTOS_ENDPOINT}" };
          EOF
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
